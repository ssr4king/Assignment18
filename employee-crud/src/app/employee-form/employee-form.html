<h2>Employee Form</h2>

<form (ngSubmit)="addEmployee()">

  <input
    type="number"
    placeholder="Employee ID"
    [(ngModel)]="employee.id"
    name="id"
  />
  <br><br>
  <input
    type="text"
    placeholder="Name"
    [(ngModel)]="employee.name"
    name="name"
  />
  <br><br>
  <input
    type="text"
    placeholder="Department"
    [(ngModel)]="employee.department"
    name="department"
  />
  <br><br>
  <input
    type="number"
    placeholder="Salary"
    [(ngModel)]="employee.salary"
    name="salary"
  />
  <br><br>
  <input
    type="email"
    placeholder="Email"
    [(ngModel)]="employee.email"
    name="email"
  />
  <br><br>
  <button type="submit"> {{empService.selectedIndex== -1 ? 'Add Employee' : 'Update Employee'}}</button>
</form>
